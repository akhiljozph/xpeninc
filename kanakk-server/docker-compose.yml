version: '3.8'

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: kanakkpusthakam
      POSTGRES_USER: kanakk
      POSTGRES_PASSWORD: root@kanakkpusthakam
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanakk -d kanakkpusthakam"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: